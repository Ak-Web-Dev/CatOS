<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat OS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Assets/ico.png" type="image/x-icon">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <!--TaskBar-->
    <nav class="navbar fixed-bottom bg-dark">
        <div class="container-fluid">
            <a class="btn btn-outline-primary" data-bs-toggle="offcanvas" href="#start" role="button" aria-controls="start">MAK OS</a>
            <div class="apps-container">
                <button class="app btn btn-outline-light" onclick="showPopup('calculator')">Calculator</button>
                <button class="app btn btn-outline-light">Web Browser</button>
                <button class="app btn btn-outline-light">Settings</button>
            </div>
        </div>
    </nav>

    <!--Start Menu-->
    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="start" aria-labelledby="start">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasExampleLabel">Start Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div>
            <h4>Some text as placeholder. In real life you can have the elements you have chosen. Like, text, images, lists, etc.</h4>
            <h4><button class="btn btn-outline-danger">Logout</button> <button class="btn btn-outline-warning">Sleep</button></h4>
            </div>
        </div>
    </div>

    <!--Calculator-->
    <div class="card popup" id="calculator" style="width: 18rem;">
        <div class="card-body">
            <div class="titlebar">
            <span class="card-title"><b>Calculator</b></span>
            <button class="close" onclick="closePopup('calculator')">X</button><hr>
        </div>
            <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
        </div>
    </div>

    


    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
